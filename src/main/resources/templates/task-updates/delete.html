<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete Task Update</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <div class="container">
        <div class="card task-accent">
            <h1 class="form-title task-title">Delete Task Update</h1>
            <p class="form-subtitle">
                Please confirm deletion of the selected task update record.
            </p>

            <div class="delete-box task-delete-box">
                <p><strong>Update ID:</strong> <span th:text="${taskUpdate.updateId}"></span></p>
                <p><strong>Project Code:</strong> <span th:text="${taskUpdate.projectInternalCode}"></span></p>
                <p><strong>Task:</strong> <span th:text="${taskUpdate.projectTask}"></span></p>
                <p><strong>Status:</strong> <span th:text="${taskUpdate.taskStatus}"></span></p>
                <p><strong>Completion Date:</strong> <span th:text="${taskUpdate.completionDate}"></span></p>
                <p><strong>Progress Percent:</strong> <span th:text="${taskUpdate.taskProgressPercent}"></span></p>
            </div>

            <form th:action="@{/task-updates/delete/{id}(id=${taskUpdate.updateId})}" method="post">
                <div class="actions">
                    <button type="submit" class="btn-danger">Delete Task Update</button>
                    <a th:href="@{/task-updates}" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
