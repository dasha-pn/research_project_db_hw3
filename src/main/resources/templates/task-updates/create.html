<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Task Update</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <div class="container">
        <div class="card task-accent">
            <h1 class="form-title task-title">Add Task Update</h1>
            <p class="form-subtitle">
                Insert a new task update record into the database.
            </p>

            <form th:action="@{/task-updates/create}" th:object="${taskUpdate}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="updateId">Update ID</label>
                        <input type="number" id="updateId" th:field="*{updateId}" required>
                    </div>

                    <div class="form-group">
                        <label for="taskReference">Project and Task</label>
                        <select id="taskReference" name="taskReference" required>
                            <option value="">-- Select task --</option>
                            <option th:each="task : ${tasks}"
                                    th:value="${task.projectInternalCode + '|' + task.projectTask}"
                                    th:text="${task.projectInternalCode + ' | ' + task.projectTask}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="taskStatus">Task Status</label>
                        <select id="taskStatus" th:field="*{taskStatus}" required>
                            <option value="">-- Select status --</option>
                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:text="${status}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="completionDate">Completion Date</label>
                        <input type="date" id="completionDate" th:field="*{completionDate}">
                    </div>

                    <div class="form-group full-width">
                        <label for="taskProgressPercent">Task Progress Percent</label>
                        <input type="number" step="0.01" id="taskProgressPercent" th:field="*{taskProgressPercent}" required>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-primary task-btn-primary">Create Task Update</button>
                    <a th:href="@{/task-updates}" class="btn-secondary">Back to task updates</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
