<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete Research Project</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <div class="container">
        <div class="card">
            <h1 class="form-title">Delete Project</h1>
            <p class="form-subtitle">
                Please confirm deletion of the selected project.
            </p>

            <div class="delete-box">
                <p><strong>Project Code:</strong> <span th:text="${project.projectInternalCode}"></span></p>
                <p><strong>Title:</strong> <span th:text="${project.projectTitle}"></span></p>
                <p><strong>Status:</strong> <span th:text="${project.projectStatus}"></span></p>
                <p><strong>Host Organization:</strong> <span th:text="${project.hostOrgName}"></span></p>
            </div>

            <form th:action="@{/projects/delete/{id}(id=${project.projectInternalCode})}" method="post">
                <div class="actions">
                    <button type="submit" class="btn-danger">Delete Project</button>
                    <a th:href="@{/projects}" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
