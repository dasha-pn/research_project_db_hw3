<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reports</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h1 {
            margin-bottom: 24px;

<h1>Reports</h1>

<div class="actions">
    <a class="button" th:href="@{/reports/project-progress}">Open Project Progress Summary</a>
